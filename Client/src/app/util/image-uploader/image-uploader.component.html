<div class="upload-container">
  <h3 class="upload-title">Upload Image</h3>

  <div
    class="upload-area"
    [class.drag-over]="isDragOver"
    [class.has-files]="uploadedFiles.length > 0"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="fileInput.click()">

    <!-- Empty state -->
    <div *ngIf="uploadedFiles.length === 0" class="empty-state">
      <div class="upload-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15L12 3M12 3L8 7M12 3L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 15V18C3 19.1046 3.89543 20 5 20H19C20.1046 20 21 19.1046 21 18V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="upload-text">Drag & drop image here or click to browse</p>
      <p class="upload-hint">Supports: JPG, PNG (max 50MB)</p>
    </div>

    <!-- File previews -->
    <div *ngIf="uploadedFiles.length > 0" class="file-previews">
      <div *ngFor="let fileData of uploadedFiles" class="file-preview">
        <img [src]="fileData.preview" [alt]="fileData.file.name" class="preview-image">
        <button
          type="button"
          class="delete-button"
          (click)="removeFile(fileData.id, $event)"
          title="Remove image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <input
    #fileInput
    type="file"
    [accept]="acceptedTypes"
    [multiple]="allowMultiple"
    (change)="onFileSelected($event)"
    style="display: none;">
</div>
