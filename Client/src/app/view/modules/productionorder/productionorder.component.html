<app-common-layout [matchedNavItem]="navItem">
  <div search>
    <form [formGroup]="ssearch" class="form-container">
      <div class="input-group mb-3">
        <input type="text" formControlName="orderno" class="form-control search-bar-items" placeholder="Order No"
               style="border-radius: 40px 0 0 40px">

        <input type="text" formControlName="createddate" class="form-control search-bar-items"
               placeholder="Created Date" onfocus="(this.type='date')" onblur="(this.type='text')">

        <input type="text" formControlName="expecteddate" class="form-control search-bar-items"
               placeholder="Expected Date" onfocus="(this.type='date')" onblur="(this.type='text')">

        <select formControlName="productionOrderStatus" class="form-select drop-down">
          <option [value]="null" selected disabled>Production Order Status</option>
          <option *ngFor="let status of productionorderstatuses" [value]="status.id">{{ status.name }}</option>
        </select>
        <button class="btn btn-dark" (click)="btnSearchMc()" style="border-radius: 0 0 0 0">
          <mat-icon style="padding-top: 7px">search</mat-icon>
        </button>
        <button class="btn btn-dark" (click)="btnSearchClearMc()" style=" border-radius: 0 40px 40px 0;">
          Clear &nbsp; &nbsp;
        </button>
      </div>
    </form>

  </div>
  <div form>
    <form [formGroup]="form">

      <mat-form-field appearance="outline">
        <mat-label>Order No</mat-label>
        <input matInput formControlName="orderNo" placeholder="Order No" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Product</mat-label>
        <mat-select (selectionChange)="onProductChange($event.value)">
          <mat-option [value]="null" selected>Not Selected</mat-option>
          <mat-option *ngFor="let product of products" [value]="product">{{ product.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Product Design</mat-label>
        <mat-select formControlName="productDesign">
          <mat-option [value]="null" selected>Not Selected</mat-option>
          <mat-option *ngFor="let productdesign of productdesigns" [value]="productdesign">{{ productdesign.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantity</mat-label>
        <input matInput type="number" formControlName="quantity">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Created Date</mat-label>
        <input matInput [matDatepicker]="createdDate" formControlName="createdDate">
        <mat-datepicker-toggle matSuffix [for]="createdDate"></mat-datepicker-toggle>
        <mat-datepicker #createdDate></mat-datepicker>
      </mat-form-field>

      <div class="form-floating mb-3 w-100">
        <input
          type="time"
          class="form-control custom-text tostart-input me-2"
          id="time"
          placeholder="Time of Created"
          formControlName="createdTime"
          [ngClass]="{
                    'border-red': toscheduledControl?.invalid && toscheduledControl?.touched, 'border-gray': toscheduledControl?.valid}"
        />
        <label for="time">Time of Created</label>
      </div>


      <mat-form-field appearance="outline">
        <mat-label>Expected Date</mat-label>
        <input matInput [matDatepicker]="expectedDate" formControlName="expectedDate">
        <mat-datepicker-toggle matSuffix [for]="expectedDate"></mat-datepicker-toggle>
        <mat-datepicker #expectedDate></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Expected Time (hrs)</mat-label>
        <input matInput type="number" formControlName="expectedTime">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>


      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="productionOrderStatus">
          <mat-option [value]="null" selected>Not Selected</mat-option>
          <mat-option *ngFor="let status of productionorderstatuses" [value]="status">{{ status.name }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Created By</mat-label>
        <input matInput formControlName="logger" placeholder="Created by">
      </mat-form-field>

      <div id="butpanel">
        <button class="btn btn-dark" (click)="add()" [disabled]="!(enaadd && hasInsertAuthority)">Add</button>
        <button class="btn btn-dark" (click)="update()" [disabled]="!(enaupd && hasUpdateAuthority)">Update</button>
        <button class="btn btn-dark" (click)="delete()" [disabled]="!(enadel && hasDeleteAuthority)">Delete</button>
        <button class="btn btn-dark" (click)="clear()">Clear</button>
      </div>

    </form>
  </div>
  <div view>

    <mat-table [dataSource]="data">
      <ng-container *ngFor="let column of columns; let i = index;" [matColumnDef]="column">
        <mat-header-cell *matHeaderCellDef class="table-header"> {{ headers[i] }}</mat-header-cell>

        <mat-cell *matCellDef="let element">
          {{ uiassist.getProperty(element, binders[i]) }}
        </mat-cell>
      </ng-container>

      <!-- Modify Button Column -->
      <ng-container matColumnDef="modify">
        <mat-header-cell *matHeaderCellDef class="table-header"> Actions</mat-header-cell>
        <mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="fillForm(row)">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              data-slot="icon"
              class="w-5 h-5 mr-3"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="columns.concat(['modify'])"></mat-header-row>
      <mat-row *matRowDef="let row; columns: columns.concat(['modify']);"
               [ngClass]="{'selected-row': row === selectedrow}">
      </mat-row>

    </mat-table>
    <mat-paginator [length]="20" [pageSize]="5" [pageSizeOptions]="[5,10,15,20]"></mat-paginator>

  </div>
</app-common-layout>
