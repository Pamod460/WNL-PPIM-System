<app-common-layout [viewCol]="0" [formCol]="0" [fullpagecol]="12" [fullpageRow]="14">
<div fullpage >
  <!-- Main Content -->
  <div class="main-content">
    <!-- Dashboard Content -->
    <div class="dashboard-main">
      <!-- Stats Cards Row -->
      <div class="stats-container">
        <!-- Available Vehicles -->


        <!-- Total Suppliers -->
        <div class="stat-card blue-card">
          <div class="card-header">
            <span class="card-title">TOTAL SUPPLIERS</span>
            <div class="card-icon blue-icon">
              <i class="fas fa-industry"></i>
            </div>
          </div>
          <div class="card-number">{{ totalSuppliers }}</div>
          <button class="details-btn" routerLink="../supplier">
            See More Details
          </button>
        </div>

        <!-- Total Employees -->
        <div class="stat-card orange-card">
          <div class="card-header">
            <span class="card-title">TOTAL PRODUCTS</span>
            <div class="card-icon orange-icon">
              <i class="fas fa-newspaper"></i>
            </div>
          </div>
          <div class="card-number">{{ totalProducts }}</div>
          <button class="details-btn" routerLink="../product">
            See More Details
          </button>
        </div>

        <!-- Total Customers -->
        <div class="stat-card teal-card">
          <div class="card-header">
            <span class="card-title">TOTAL AGENTS</span>
            <div class="card-icon teal-icon">
              <i class="fas fa-user-friends"></i>
            </div>
          </div>
          <div class="card-number">{{ totalAgents }}</div>
          <button class="details-btn" routerLink="../agent">
            See More Details
          </button>
        </div>
        <div class="stat-card green-card">
          <div class="card-header">
            <span class="card-title">AVAILABLE VEHICLES</span>
            <div class="card-icon green-icon">
              <i class="fas fa-truck"></i>
            </div>
          </div>
          <div class="card-number">{{ totalVehicles }}</div>
          <button class="details-btn" routerLink="../vehicle">
            See More Details
          </button>
        </div>
      </div>

      <!-- Bottom Section -->
      <div class="bottom-container">
        <!-- Contact Details -->
        <div class="chart-panel">
          <div>
            <app-inventory-rop-chart [inventoryData]="paperInventoryData" [chartTitle]="'Paper Inventory Status'"></app-inventory-rop-chart>

            <button class="details-btn chart-details-btn" routerLink="../paper">
              See More Details
            </button>
          </div>

<!--          <h3 class="panel-title">Contact Details</h3>-->

<!--              </div>-->
<!--            </div>-->
<!--          </div>-->

        </div>

        <!-- Chart Panel -->
        <div class="chart-panel">

          <app-inventory-rop-chart [inventoryData]="inventoryData" [chartTitle]="'Material Inventory Status'"></app-inventory-rop-chart>
