
<!-- Hero Section -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-text">
      <h1 class="hero-title">
        Welcome to Wjeya Newspapers
        <span class="gradient-text">Agent Portal</span>
      </h1>
      <p class="hero-subtitle">
        Streamline your newspaper distribution business with our modern agent management system.
        Register, place orders, and manage your routes efficiently.
      </p>
      <div class="hero-buttons">
        <button class="btn btn-primary btn-large" routerLink="/public/agentorder">
          Get Started
          <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </button>
        <button class="btn btn-outline btn-large" (click)="scrollToFeatures()">
          Learn More
        </button>
      </div>
    </div>
    <div class="hero-image">
      <div class="hero-graphic">
        <div class="floating-card card-1">
          <div class="card-icon">📰</div>
          <div class="card-text">Order Management</div>
        </div>
        <div class="floating-card card-2">
          <div class="card-icon">🚚</div>
          <div class="card-text">Route Planning</div>
        </div>
        <div class="floating-card card-3">
          <div class="card-icon">📊</div>
          <div class="card-text">Analytics</div>
        </div>
      </div>
    </div>
  </div>
</section>
